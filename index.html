<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>K예술영재 프로젝트 · 페이지 준비중</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --teal-deep:#2C4760;
    --teal-mid:#1B4C58;
    --cream:#FBF4E4;
    --paper:#FFFDF7;
    --gold:#EFC758;
    --gold-soft:#F3D48A;
    --gold-dim: rgba(231,185,92,0.18);
    --ink:#16282C;
    --ink-soft:#3C5257;
    --serif: 'Noto Serif KR', serif;
    --sans: 'Noto Sans KR', sans-serif;
    --shadow: 0 18px 40px -18px rgba(18,58,68,0.35);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:var(--sans); color:var(--ink); background:var(--cream);
    -webkit-font-smoothing:antialiased; word-break:keep-all; overflow-wrap:break-word;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }

  .card{
    width:100%; max-width:420px; background:var(--paper); border-radius:22px;
    box-shadow:var(--shadow); overflow:hidden;
  }

  .card-head{
    background:var(--teal-deep); color:var(--cream); padding:26px 26px 22px; text-align:center;
    position:relative;
  }
  .card-head::before{
    content:""; position:absolute; inset:8px; border:1px solid rgba(239,199,88,0.35); border-radius:12px;
    pointer-events:none;
  }
  .bh-title{ font-family:var(--serif); font-weight:800; font-size:19px; color:var(--gold-soft); }
  .bh-sub{ font-family:var(--serif); font-weight:500; font-size:13px; color:var(--cream); opacity:0.9; margin-top:2px; }

  .card-body{
    padding:64px 28px; text-align:center; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
  }
  .icon{
    width:54px; height:54px; border-radius:50%; background:var(--gold-dim);
    display:flex; align-items:center; justify-content:center; font-size:24px;
  }
  .msg{
    font-family:var(--serif); font-weight:700; font-size:19px; color:var(--ink-soft); margin:0;
  }
  .sub{
    font-size:13px; color:var(--ink-soft); opacity:0.75; margin:0;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="card-head">
      <div class="bh-title">K예술영재 프로젝트</div>
      <div class="bh-sub">전통예술 분야 워크숍</div>
    </div>
    <div class="card-body">
      <div class="icon">🛠️</div>
      <p class="msg">페이지 준비 중입니다.</p>
    </div>
  </div>

</body>
</html>
